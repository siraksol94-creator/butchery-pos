<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Butchery Pro — Admin Panel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

  /* ── Login ── */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: #fff; border-radius: 16px; padding: 48px 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.12); text-align: center; }
  .login-card h1 { font-size: 22px; margin: 16px 0 4px; }
  .login-card p { color: #64748b; font-size: 14px; margin-bottom: 28px; }
  .login-logo { font-size: 48px; }
  input[type=password] { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; }
  input[type=password]:focus { border-color: #2563eb; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .88; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-danger  { background: #dc2626; color: #fff; }
  .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #374151; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; margin-top: 14px; padding: 12px; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: 10px; }

  /* ── Layout ── */
  #app { display: none; }
  .sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100vh; background: #1e293b; color: #e2e8f0; padding: 24px 0; }
  .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid #334155; }
  .sidebar-logo h2 { font-size: 16px; color: #f8fafc; margin-top: 8px; }
  .sidebar-logo p  { font-size: 11px; color: #94a3b8; }
  .sidebar nav { padding: 16px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 14px; color: #cbd5e1; cursor: pointer; transition: background .15s; }
  .nav-item:hover, .nav-item.active { background: #334155; color: #f8fafc; }
  .main { margin-left: 220px; padding: 32px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── Cards ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .stat-card .label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; }
  .stat-card .value { font-size: 32px; font-weight: 700; margin-top: 6px; }
  .stat-card.green .value { color: #16a34a; }
  .stat-card.red   .value { color: #dc2626; }
  .stat-card.amber .value { color: #d97706; }

  /* ── Table ── */
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid #e2e8f0; }
  .card-header h3 { font-size: 15px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 16px; text-align: left; font-size: 13px; }
  th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  tr:not(:last-child) td { border-bottom: 1px solid #f1f5f9; }
  tr:hover td { background: #f8fafc; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-green  { background: #dcfce7; color: #16a34a; }
  .badge-red    { background: #fee2e2; color: #dc2626; }
  .badge-amber  { background: #fef3c7; color: #d97706; }
  .badge-gray   { background: #f1f5f9; color: #64748b; }
  .key-mono { font-family: monospace; font-size: 13px; letter-spacing: 1px; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 32px; width: 420px; max-width: 95vw; box-shadow: 0 24px 64px rgba(0,0,0,.2); }
  .modal h3 { font-size: 18px; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: #2563eb; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .loading { text-align: center; padding: 40px; color: #94a3b8; }

  /* ── Patch modal ── */
  #patch-info { font-size: 13px; color: #64748b; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════ LOGIN ════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🥩</div>
    <h1>Butchery Pro</h1>
    <p>Admin Panel — License Management</p>
    <input type="password" id="pw-input" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()" />
    <button class="btn btn-primary btn-full" onclick="login()">Sign In</button>
    <p class="error-msg" id="login-error"></p>
  </div>
</div>

<!-- ═══════════════════════════════ APP ══════════════════════════════════════ -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div style="font-size:32px">🥩</div>
      <h2>Butchery Pro</h2>
      <p>Admin Panel</p>
    </div>
    <nav>
      <div class="nav-item active" onclick="showPage('dashboard')">📊 Dashboard</div>
      <div class="nav-item" onclick="showPage('licenses')">🔑 Licenses</div>
      <div class="nav-item" style="margin-top:auto" onclick="logout()">🚪 Sign Out</div>
    </nav>
  </div>

  <div class="main">

    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
      <h2 style="margin-bottom:24px">Dashboard</h2>
      <div class="stats-grid" id="stats-grid">
        <div class="loading">Loading…</div>
      </div>
    </div>

    <!-- Licenses -->
    <div class="page" id="page-licenses">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2>License Keys</h2>
        <button class="btn btn-success" onclick="openCreateModal()">+ Generate License Key</button>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Key</th>
              <th>Email</th>
              <th>Branches</th>
              <th>Expires</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="licenses-tbody">
            <tr><td colspan="6" class="loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════ MODALS ════════════════════════════════════ -->

<!-- Create license -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h3>Generate New License Key</h3>
    <div class="form-group">
      <label>Expiry Date</label>
      <input type="date" id="new-expires" />
    </div>
    <div class="form-group">
      <label>Max Branches</label>
      <select id="new-branches">
        <option value="1">1 branch</option>
        <option value="2">2 branches</option>
        <option value="3">3 branches</option>
        <option value="5">5 branches</option>
        <option value="10">10 branches</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes (client name, etc.)</label>
      <input type="text" id="new-notes" placeholder="e.g. Habte Butchery - Addis Ababa" />
    </div>
    <div id="created-key-box" style="display:none;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:16px;text-align:center;margin-bottom:8px">
      <p style="font-size:12px;color:#16a34a;margin-bottom:8px">License key generated — copy and send to client:</p>
      <p class="key-mono" id="created-key-text" style="font-size:16px;background:transparent"></p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('create-modal')">Close</button>
      <button class="btn btn-success" id="create-btn" onclick="createLicense()">Generate</button>
    </div>
  </div>
</div>

<!-- Patch license -->
<div class="modal-overlay" id="patch-modal">
  <div class="modal">
    <h3>Edit License</h3>
    <p id="patch-info"></p>
    <div class="form-group">
      <label>Extend Expiry To</label>
      <input type="date" id="patch-expires" />
    </div>
    <div class="form-group">
      <label>Max Branches</label>
      <select id="patch-branches">
        <option value="1">1 branch</option>
        <option value="2">2 branches</option>
        <option value="3">3 branches</option>
        <option value="5">5 branches</option>
        <option value="10">10 branches</option>
      </select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="patch-active">
        <option value="1">Active</option>
        <option value="0">Deactivated</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('patch-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePatch()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  let TOKEN = localStorage.getItem('admin_token') || '';
  let patchKey = '';

  // ── Auth ───────────────────────────────────────────────────────────────────
  async function login() {
    const pw = document.getElementById('pw-input').value;
    const r  = await fetch('/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (r.ok) {
      const d = await r.json();
      TOKEN = d.token;
      localStorage.setItem('admin_token', TOKEN);
      showApp();
    } else {
      document.getElementById('login-error').textContent = 'Wrong password.';
    }
  }

  function logout() {
    localStorage.removeItem('admin_token');
    TOKEN = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadStats();
  }

  // Auto-login if token exists
  if (TOKEN) {
    fetch('/admin/stats', { headers: { 'x-admin-token': TOKEN } })
      .then(r => r.ok ? showApp() : null)
      .catch(() => {});
  }

  // ── Pages ──────────────────────────────────────────────────────────────────
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'licenses') loadLicenses();
    if (name === 'dashboard') loadStats();
  }

  // ── Stats ──────────────────────────────────────────────────────────────────
  async function loadStats() {
    const r = await fetch('/admin/stats', { headers: { 'x-admin-token': TOKEN } });
    const d = await r.json();
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="label">Total Licenses</div><div class="value">${d.total}</div></div>
      <div class="stat-card green"><div class="label">Active</div><div class="value">${d.active}</div></div>
      <div class="stat-card amber"><div class="label">Expiring (14d)</div><div class="value">${d.expiring}</div></div>
      <div class="stat-card red"><div class="label">Expired</div><div class="value">${d.expired}</div></div>
    `;
  }

  // ── Licenses table ─────────────────────────────────────────────────────────
  async function loadLicenses() {
    const r  = await fetch('/admin/licenses', { headers: { 'x-admin-token': TOKEN } });
    const ls = await r.json();
    const now = new Date();

    document.getElementById('licenses-tbody').innerHTML = ls.length === 0
      ? '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:32px">No licenses yet</td></tr>'
      : ls.map(l => {
          const expiry   = new Date(l.expires_at);
          const days     = Math.ceil((expiry - now) / 86400000);
          const expired  = days <= 0;
          const expiring = !expired && days <= 14;
          const badge    = !l.is_active ? '<span class="badge badge-gray">Inactive</span>'
                         : expired      ? '<span class="badge badge-red">Expired</span>'
                         : expiring     ? '<span class="badge badge-amber">Expiring</span>'
                         :                '<span class="badge badge-green">Active</span>';
          const expiryStr = expired
            ? `<span style="color:#dc2626">${l.expires_at.substring(0,10)}</span>`
            : expiring
            ? `<span style="color:#d97706">${l.expires_at.substring(0,10)} (${days}d)</span>`
            : l.expires_at.substring(0,10);
          return `<tr>
            <td><span class="key-mono">${l.key}</span></td>
            <td>${l.tenant_email || '<span style="color:#94a3b8">—</span>'}</td>
            <td>${l.branch_count}/${l.max_branches}</td>
            <td>${expiryStr}</td>
            <td>${badge}</td>
            <td>
              <button class="btn btn-outline btn-sm" onclick='openPatchModal(${JSON.stringify(l)})'>Edit</button>
            </td>
          </tr>`;
        }).join('');
  }

  // ── Create modal ───────────────────────────────────────────────────────────
  function openCreateModal() {
    document.getElementById('created-key-box').style.display = 'none';
    document.getElementById('create-btn').style.display = 'inline-flex';
    document.getElementById('new-notes').value = '';
    // Default expiry: 1 year from today
    const d = new Date(); d.setFullYear(d.getFullYear() + 1);
    document.getElementById('new-expires').value = d.toISOString().substring(0,10);
    document.getElementById('create-modal').classList.add('open');
  }

  async function createLicense() {
    const expiresAt   = document.getElementById('new-expires').value;
    const maxBranches = document.getElementById('new-branches').value;
    const notes       = document.getElementById('new-notes').value;
    if (!expiresAt) return alert('Please set an expiry date.');

    const r = await fetch('/admin/licenses', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
      body: JSON.stringify({ expiresAt, maxBranches, notes }),
    });
    const d = await r.json();
    if (!r.ok) return alert(d.error);

    document.getElementById('created-key-text').textContent = d.key;
    document.getElementById('created-key-box').style.display = 'block';
    document.getElementById('create-btn').style.display = 'none';
    loadLicenses();
    loadStats();
  }

  // ── Patch modal ────────────────────────────────────────────────────────────
  function openPatchModal(l) {
    patchKey = l.key;
    document.getElementById('patch-info').textContent = `Key: ${l.key}  |  Client: ${l.tenant_email || 'Not activated'}`;
    document.getElementById('patch-expires').value  = l.expires_at.substring(0,10);
    document.getElementById('patch-branches').value = l.max_branches;
    document.getElementById('patch-active').value   = l.is_active;
    document.getElementById('patch-modal').classList.add('open');
  }

  async function savePatch() {
    const r = await fetch('/admin/licenses/' + patchKey, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
      body: JSON.stringify({
        expiresAt:   document.getElementById('patch-expires').value,
        maxBranches: Number(document.getElementById('patch-branches').value),
        isActive:    Number(document.getElementById('patch-active').value),
      }),
    });
    if (!r.ok) { const d = await r.json(); return alert(d.error); }
    closeModal('patch-modal');
    loadLicenses();
    loadStats();
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(o =>
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
  );
</script>
</body>
</html>
