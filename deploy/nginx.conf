server {
    listen 80;
    server_name butchery.sidanitsolutions.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name butchery.sidanitsolutions.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/butchery.sidanitsolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/butchery.sidanitsolutions.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy all requests to the Node.js backend
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Larger body size for product image uploads
    client_max_body_size 20M;
}
